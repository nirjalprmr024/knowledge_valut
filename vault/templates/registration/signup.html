<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4 shadow-lg border-0" style="width: 400px; border-radius: 12px;">

  <!-- Logo / Title -->
  <div class="text-center mb-3">
    <h3>📝 Notes</h3>
  </div>

  <!-- Heading -->
  <h5 class="text-center fw-bold">Create account</h5>
  <p class="text-center text-muted">Start organizing your thoughts today</p>

  <!-- Form -->
  <form method="POST">
    {% csrf_token %}

    <!-- Username -->
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" placeholder="John Doe" required>
    </div>

    <!-- Email -->
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
    </div>

    <!-- Password -->
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>

    <!-- Button -->
    <button type="submit" class="btn btn-dark w-100 py-2">
      Create account
    </button>

  </form>

  <!-- Footer -->
  <p class="text-center mt-3">
    Already have an account?
    <a href="/accounts/login/">Sign in</a>
  </p>

</div>

</body>
</html>
