<h1>My Knowledge Vault</h1>

<p>
<a href="{% url 'add_note' %}">Add Note</a>

<form action="{% url 'logout' %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit">Logout</button>
</form>
</p>

<ul>
{% for note in notes %}
    <li>
        <a href="{% url 'note_detail' note.id %}">
            {{ note.title }}
        </a>
    </li>
{% empty %}
    <li>No notes yet. Click "Add Note" to create one.</li>
{% endfor %}
</ul>
